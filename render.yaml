services:
  - type: web
    name: superbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: MASTER_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: superbot-db
          property: connectionString
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: 15
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: 7
      - key: INVITE_CODE
        generateValue: true
        description: Invite code for new user registration (leave empty to allow open registration)

databases:
  - name: superbot-db
    plan: free
    databaseName: superbot
    user: superbot
