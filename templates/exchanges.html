{% extends "base.html" %}

{% block title %}SUPERBOT - Управление биржами{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <div>
            <h1>Управление биржами</h1>
            <p class="page-subtitle">Добавьте API ключи для торговли</p>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Добавить биржу
        </button>
    </div>

    <!-- Exchanges Grid -->
    <div class="exchanges-grid" id="exchangesList">
        <div class="loading-state">Загрузка...</div>
    </div>
</div>

<!-- Modal: Add Exchange -->
<div class="modal" id="addModal">
    <div class="modal-overlay" onclick="closeAddModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>Добавить биржу</h3>
            <button class="modal-close" onclick="closeAddModal()">&times;</button>
        </div>
        <form id="addExchangeForm" onsubmit="return addExchange(event)">
            <div class="form-group">
                <label>Биржа <span class="required">*</span></label>
                <select name="name" required>
                    <option value="">Выберите биржу</option>
                    {% for ex in supported %}
                    <option value="{{ ex }}">{{ ex|upper }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Название <span class="required">*</span></label>
                <input type="text" name="display_name" placeholder="Например: Моя BingX" required>
            </div>
            <div class="form-group">
                <label>API Key <span class="required">*</span></label>
                <input type="password" name="api_key" placeholder="Введите API Key" required>
            </div>
            <div class="form-group">
                <label>API Secret <span class="required">*</span></label>
                <input type="password" name="api_secret" placeholder="Введите API Secret" required>
            </div>
            <div class="form-group">
                <label>Passphrase <span class="hint">(только для OKX)</span></label>
                <input type="password" name="passphrase" placeholder="Введите Passphrase">
            </div>
            <div class="form-group form-toggle">
                <label class="toggle">
                    <input type="checkbox" name="is_demo" checked>
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">DEMO режим (VST / Paper Trading)</span>
                </label>
            </div>
            <div class="form-hint">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
                API ключи шифруются перед сохранением в базу данных
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeAddModal()">Отмена</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', loadExchanges);

async function loadExchanges() {
    const container = document.getElementById('exchangesList');
    container.innerHTML = '<div class="loading-state">Загрузка бирж...</div>';

    try {
        const res = await fetch('/api/exchanges');
        const data = await res.json();
        if (data.success) {
            renderExchanges(data.data || []);
        } else {
            container.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
        }
    } catch (e) {
        container.innerHTML = '<div class="empty-state">Ошибка соединения</div>';
    }
}

function renderExchanges(exchanges) {
    const container = document.getElementById('exchangesList');
    if (!exchanges.length) {
        container.innerHTML = `
            <div class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <h3>Нет добавленных бирж</h3>
                <p>Нажмите "Добавить биржу" чтобы начать</p>
            </div>
        `;
        return;
    }

    container.innerHTML = exchanges.map(ex => `
        <div class="exchange-card ${ex.is_active ? 'active' : 'inactive'}">
            <div class="exchange-header">
                <div class="exchange-icon ${ex.name}">${ex.name.substring(0,2).toUpperCase()}</div>
                <div class="exchange-info">
                    <h4>${escapeHtml(ex.display_name)}</h4>
                    <span class="exchange-name">${ex.name.toUpperCase()}</span>
                </div>
                <div class="exchange-badges">
                    <span class="badge ${ex.is_demo ? 'demo' : 'real'}">${ex.is_demo ? 'DEMO' : 'REAL'}</span>
                    <span class="badge ${ex.is_active ? 'status-online' : 'status-offline'}">${ex.is_active ? 'Активна' : 'Выключена'}</span>
                </div>
            </div>
            <div class="exchange-details">
                <div class="detail-row">
                    <span class="detail-label">API Key</span>
                    <code class="detail-value">${ex.api_key_masked || '***'}</code>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Добавлена</span>
                    <span class="detail-value">${formatDate(ex.created_at)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Обновлена</span>
                    <span class="detail-value">${formatDate(ex.updated_at)}</span>
                </div>
            </div>
            <div class="exchange-actions">
                <button class="btn btn-sm ${ex.is_active ? 'btn-warning' : 'btn-success'}" 
                        onclick="toggleExchange(${ex.id})">
                    ${ex.is_active ? 'Выключить' : 'Включить'}
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteExchange(${ex.id})">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Удалить
                </button>
            </div>
        </div>
    `).join('');
}

function openAddModal() {
    document.getElementById('addModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('show');
    document.body.style.overflow = '';
}

document.getElementById('addExchangeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    const data = {
        name: formData.get('name'),
        display_name: formData.get('display_name').trim(),
        api_key: formData.get('api_key').trim(),
        api_secret: formData.get('api_secret').trim(),
        passphrase: formData.get('passphrase')?.trim() || null,
        is_demo: formData.has('is_demo')
    };

    if (!data.name || !data.display_name || !data.api_key || !data.api_secret) {
        showToast('Заполните все обязательные поля', 'error');
        return;
    }

    try {
        const res = await fetch('/api/exchanges', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            showToast('Биржа добавлена!', 'success');
            closeAddModal();
            form.reset();
            loadExchanges();
        } else {
            showToast(result.error || 'Ошибка сохранения', 'error');
        }
    } catch (e) {
        showToast('Ошибка соединения', 'error');
    }
});

async function toggleExchange(id) {
    try {
        const res = await fetch(`/api/exchanges/${id}/toggle`, {method: 'POST'});
        const data = await res.json();
        if (data.success) {
            showToast(data.data.is_active ? 'Биржа включена' : 'Биржа выключена', 'success');
            loadExchanges();
        } else {
            showToast(data.error || 'Ошибка', 'error');
        }
    } catch (e) {
        showToast('Ошибка соединения', 'error');
    }
}

async function deleteExchange(id) {
    if (!confirm('Удалить биржу? Это действие нельзя отменить.')) return;
    try {
        const res = await fetch(`/api/exchanges/${id}`, {method: 'DELETE'});
        const data = await res.json();
        if (data.success) {
            showToast('Биржа удалена', 'success');
            loadExchanges();
        } else {
            showToast(data.error || 'Ошибка удаления', 'error');
        }
    } catch (e) {
        showToast('Ошибка соединения', 'error');
    }
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
}

// Close modal on Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAddModal();
});
</script>
<script>
const TOKEN_KEY = 'sb_access_token';
const REFRESH_KEY = 'sb_refresh_token';
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function getRefreshToken() { return localStorage.getItem(REFRESH_KEY); }

async function apiFetch(url, options = {}) {
  if (!options.headers) options.headers = {};
  options.headers['Content-Type'] = 'application/json';
  const token = getToken();
  if (token) options.headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(url, options);
  if (res.status === 401 && getRefreshToken()) {
    const refreshed = await refreshAccessToken();
    if (refreshed) { options.headers['Authorization'] = 'Bearer ' + getToken(); return fetch(url, options); }
  }
  return res;
}

async function refreshAccessToken() {
  const refreshToken = getRefreshToken();
  if (!refreshToken) return false;
  try {
    const res = await fetch('/api/auth/refresh', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({refresh_token: refreshToken}) });
    const data = await res.json();
    if (data.success) { localStorage.setItem(TOKEN_KEY, data.access_token); localStorage.setItem(REFRESH_KEY, data.refresh_token); return true; }
  } catch (e) {}
  localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(REFRESH_KEY); return false;
}

(async function checkAuth() {
  const token = getToken();
  if (!token) { window.location.href = '/login'; return; }
  try { const res = await apiFetch('/api/auth/me'); if (!res.ok) window.location.href = '/login'; }
  catch (e) { window.location.href = '/login'; }
})();

async function addExchange(e) {
  e.preventDefault();
  const form = document.getElementById('addExchangeForm');
  let alertBox = document.getElementById('exchangeAlert');
  if (!alertBox) { alertBox = document.createElement('div'); alertBox.id = 'exchangeAlert'; alertBox.style.marginBottom = '15px'; form.insertBefore(alertBox, form.firstChild); }
  const nameEl = document.getElementById('exchangeName');
  const apiKeyEl = document.getElementById('apiKey');
  const apiSecretEl = document.getElementById('apiSecret');
  const passphraseEl = document.getElementById('passphrase');
  const isDemoEl = document.getElementById('isDemo');
  const data = {
    name: nameEl ? nameEl.value.toLowerCase() : '',
    display_name: (document.getElementById('displayName')?.value || nameEl?.value || 'Exchange').trim(),
    api_key: (apiKeyEl ? apiKeyEl.value : '').trim(),
    api_secret: (apiSecretEl ? apiSecretEl.value : '').trim(),
    passphrase: (passphraseEl ? passphraseEl.value : '').trim() || null,
    is_demo: isDemoEl ? isDemoEl.checked : true
  };
  if (!data.api_key || !data.api_secret) { alertBox.innerHTML = '<div style="background:rgba(255,85,119,0.15);color:#ff5577;border:1px solid rgba(255,85,119,0.3);padding:12px;border-radius:8px;">API Key and Secret are required</div>'; return false; }
  try {
    const resp = await apiFetch('/api/exchanges', { method: 'POST', body: JSON.stringify(data) });
    const result = await resp.json();
    if (result.success) { alertBox.innerHTML = '<div style="background:rgba(0,229,160,0.15);color:#00e5a0;border:1px solid rgba(0,229,160,0.3);padding:12px;border-radius:8px;">Exchange added!</div>'; setTimeout(() => { hideModal('addExchangeModal'); location.reload(); }, 1000); }
    else { alertBox.innerHTML = '<div style="background:rgba(255,85,119,0.15);color:#ff5577;border:1px solid rgba(255,85,119,0.3);padding:12px;border-radius:8px;">' + (result.error || 'Failed') + '</div>'; }
  } catch (err) { alertBox.innerHTML = '<div style="background:rgba(255,85,119,0.15);color:#ff5577;border:1px solid rgba(255,85,119,0.3);padding:12px;border-radius:8px;">Network error</div>'; }
  return false;
}
</script>
{% endblock %}
