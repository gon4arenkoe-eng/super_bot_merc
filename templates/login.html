<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERBOT v5.5.40 — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e6ed;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .logo .version {
            color: #64748b;
            font-size: 12px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            color: #e0e6ed;
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            border-radius: 8px;
            color: #0a0e1a;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
        }
        .btn-secondary:hover {
            background: rgba(56, 189, 248, 0.1);
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }
        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }
        .toggle-mode {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 13px;
        }
        .toggle-mode a {
            color: #38bdf8;
            cursor: pointer;
            text-decoration: none;
        }
        .toggle-mode a:hover {
            text-decoration: underline;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #475569;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
        }
        .divider span {
            padding: 0 12px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>SUPERBOT</h1>
            <div class="version">v5.5.40 Mercedes Edition — JWT Auth</div>
        </div>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <!-- REGISTER FORM (hidden by default) -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Choose username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Min 6 characters" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="regPassword2" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn" id="regBtn">Create Account</button>
        </form>

        <div class="divider"><span>or</span></div>

        <button class="btn btn-secondary" id="toggleBtn" onclick="toggleMode()">New user? Register</button>

        <div class="toggle-mode">
            <span id="toggleText">Don't have an account?</span>
            <a onclick="toggleMode()" id="toggleLink">Register</a>
        </div>
    </div>

    <script>
        // ── JWT Token Management ──────────────────────────────────────
        const TOKEN_KEY = 'sb_access_token';
        const REFRESH_KEY = 'sb_refresh_token';

        function getToken() { return localStorage.getItem(TOKEN_KEY); }
        function setToken(token) { localStorage.setItem(TOKEN_KEY, token); }
        function getRefreshToken() { return localStorage.getItem(REFRESH_KEY); }
        function setRefreshToken(token) { localStorage.setItem(REFRESH_KEY, token); }
        function clearTokens() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(REFRESH_KEY);
        }

        // ── API Helper with JWT ───────────────────────────────────────
        async function apiFetch(url, options = {}) {
            if (!options.headers) options.headers = {};
            options.headers['Content-Type'] = 'application/json';
            const token = getToken();
            if (token) {
                options.headers['Authorization'] = 'Bearer ' + token;
            }
            const res = await fetch(url, options);
            // If 401, try refresh
            if (res.status === 401 && getRefreshToken()) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    options.headers['Authorization'] = 'Bearer ' + getToken();
                    return fetch(url, options);
                }
            }
            return res;
        }

        async function refreshAccessToken() {
            const refreshToken = getRefreshToken();
            if (!refreshToken) return false;
            try {
                const res = await fetch('/api/auth/refresh', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({refresh_token: refreshToken})
                });
                const data = await res.json();
                if (data.success) {
                    setToken(data.access_token);
                    setRefreshToken(data.refresh_token);
                    return true;
                }
            } catch (e) {
                console.error('Refresh failed:', e);
            }
            clearTokens();
            return false;
        }

        // ── UI Helpers ────────────────────────────────────────────────
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        let isLoginMode = true;
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('loginForm').classList.toggle('hidden', !isLoginMode);
            document.getElementById('registerForm').classList.toggle('hidden', isLoginMode);
            document.getElementById('toggleBtn').textContent = isLoginMode ? 'New user? Register' : 'Already have an account? Sign In';
            document.getElementById('toggleText').textContent = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleLink').textContent = isLoginMode ? 'Register' : 'Sign In';
            clearMessages();
        }

        // ── Login Handler ──────────────────────────────────────────────
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            clearMessages();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const username = document.getElementById('loginUsername').value.trim().toLowerCase();
                const password = document.getElementById('loginPassword').value;

                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if (data.success) {
                    setToken(data.access_token);
                    setRefreshToken(data.refresh_token);
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard', 500);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        };

        // ── Register Handler ───────────────────────────────────────────
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            clearMessages();
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const username = document.getElementById('regUsername').value.trim().toLowerCase();
                const password = document.getElementById('regPassword').value;
                const password2 = document.getElementById('regPassword2').value;

                if (password !== password2) {
                    showError('Passwords do not match');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }
                if (password.length < 6) {
                    showError('Password must be at least 6 characters');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }

                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if (data.success) {
                    setToken(data.access_token);
                    setRefreshToken(data.refresh_token);
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard', 500);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        };

        // ── Auto-redirect if already logged in ────────────────────────
        (async function checkAuth() {
            const token = getToken();
            if (token) {
                try {
                    const res = await apiFetch('/api/auth/me');
                    if (res.ok) {
                        window.location.href = '/dashboard';
                    }
                } catch (e) {
                    clearTokens();
                }
            }
        })();
    </script>
</body>
</html>
