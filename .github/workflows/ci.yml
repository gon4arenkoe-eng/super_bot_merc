name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic import check
        run: |
          python -c "import app"

      - name: Check for syntax errors
        run: |
          python -m py_compile app.py
          for f in core/*.py; do python -m py_compile "$f"; done

      - name: Check logs directory
        run: |
          test -d logs || mkdir logs

      - name: Smoke tests
        run: |
          python -c "from core.risk import RiskManager; print('RiskManager OK')"
          python -c "from core.api_clients import BingXClient; print('BingXClient OK')"
