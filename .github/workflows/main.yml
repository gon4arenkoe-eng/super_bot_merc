name: SUPERBOT CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.11'
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  MASTER_KEY: ${{ secrets.MASTER_KEY }}
  DATABASE_URL: sqlite:///test.db

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 app.py core/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app.py core/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test imports
      run: |
        python -c "import app"
        python -c "from core.parsers import parse_balance, parse_all_positions, parse_klines"
        python -c "from core.strategies.ema_cross import EMAStrategy"
        python -c "from core.sentiment.analyzer import SentimentAnalyzer"

    - name: Run unit tests (if tests/ exists)
      run: |
        if [ -d "tests" ]; then
          pytest tests/ -v --cov=app --cov=core --cov-report=xml
        else
          echo "No tests/ directory found. Skipping tests."
        fi

    - name: Upload coverage to Codecov
      if: hashFiles('coverage.xml') != ''
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan
      run: bandit -r app.py core/ -f json -o bandit-report.json || true

    - name: Check for known vulnerabilities
      run: safety check -r requirements.txt || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Render
      if: github.event_name == 'push'
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        echo "Triggering Render deploy..."
        curl -X POST           -H "Authorization: Bearer $RENDER_API_KEY"           -H "Content-Type: application/json"           https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys

    - name: Health check
      if: github.event_name == 'push'
      run: |
        echo "Waiting for deploy..."
        sleep 60
        curl -f https://super-bot-merc.onrender.com/health || exit 1
